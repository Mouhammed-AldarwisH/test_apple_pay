<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة الدفع - ميسر</title>

    <link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css" />
    <script src="https://polyfill.io/v3/polyfill.min.js?features=fetch"></script>
    <script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>

    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #f4f4f9; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
        }
        .checkout-box { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .price { text-align: center; color: #7f8c8d; font-size: 18px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="checkout-box">
        <h2>شراء حذاء رياضي</h2>
        <div class="price">المبلغ: 150 ريال سعودي</div>
        
        <div class="mysr-form"></div>
    </div>

    <script>
        Moyasar.init({
            // ربط الفورم بالحاوية الموجودة في الـ HTML
            element: '.mysr-form',
            
            // المبلغ بالهللات (15000 = 150 ريال)
            amount: 15000, 
            currency: 'SAR',
            description: 'تجربة شراء حذاء',
            
            // ⚠️ استبدل هذا بمفتاحك العام من لوحة تحكم ميسر (يبدأ بـ pk_test)
            publishable_api_key: 'pk_test_JdCPw2pvwzMZedvRA9tTZcnCRJCmdDafSUtgQWbx', 
            
            // الرابط الذي سيعود إليه العميل بعد الدفع بنجاح
            callback_url: 'https://mouhammed-aldarwish.github.io/success.html', 
            // أضف هذا السطر داخل الـ init
supported_networks: ['mada', 'visa', 'mastercard', 'amex'],
            // وسائل الدفع المفعلة
            methods: [
                'applepay',
                'creditcard' 
            ],

            // إعدادات أبل باي الإضافية (اختيارية لكن يفضل وجودها)
            apple_pay: {
                country: 'SA',
                label: 'متجر الأحذية',
                validate_merchant_url: 'https://api.moyasar.com/v1/applepay/initiate'
            }
        });
    </script>

</body>
</html>
