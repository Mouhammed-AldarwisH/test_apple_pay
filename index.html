<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الأحذية - دفع آمن</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        #payment-request-button { margin-top: 20px; width: 300px; }
        .product-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; width: 250px; }
    </style>
</head>
<body>

    <div class="product-card">
        <h2>حذاء رياضي برو</h2>
        <p>السعر: 150 ريال</p>
        <div id="payment-request-button"></div>
        <p id="status-msg"></p>
    </div>

<script>
    // 1. إعداد Stripe بالمفتاح العام
    const stripe = Stripe('pk_test_51TGeUBF3jU1buP5ohLn0DfnkA2WU3IPW9GXl4Z2BRwJg6QgIDurKJgT7GpBYXlSzA68AR27lLKJku9lpMT6X0tdy00qj3Cz7XY');
    const statusMsg = document.getElementById('status-msg');

    // 2. إعداد تفاصيل الدفع (المبلغ والعملة)
    const paymentRequest = stripe.paymentRequest({
        country: 'SA',
        currency: 'sar',
        total: { label: 'إجمالي الحذاء', amount: 15000 }, // 150.00 ريال
        requestPayerName: true,
        requestPayerEmail: true,
    });

    const elements = stripe.elements();
    const prButton = elements.create('paymentRequestButton', { paymentRequest });

    // 3. التحقق مما إذا كان الجهاز يدعم Apple Pay
    paymentRequest.canMakePayment().then((result) => {
        if (result) {
            prButton.mount('#payment-request-button');
        } else {
            document.getElementById('payment-request-button').style.display = 'none';
            statusMsg.innerText = "Apple Pay غير متاح على هذا المتصفح/الجهاز.";
        }
    });

    // 4. معالجة عملية الدفع عند ضغط الزر
    paymentRequest.on('paymentmethod', async (ev) => {
        
        // أ. استدعاء الـ Edge Function للحصول على الـ Client Secret
        const response = await fetch('https://ulmpdgjeoplgwmekastp.supabase.co/functions/v1/create-payment-intent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: 15000 })
        });
        
        const { clientSecret } = await response.json();

        // ب. تأكيد الدفع مع Stripe
        const { paymentIntent, error: confirmError } = await stripe.confirmApplePayPayment(
            clientSecret,
            { payment_method: ev.paymentMethod.id },
            { handleActions: false }
        );

        if (confirmError) {
            ev.complete('fail');
            statusMsg.innerText = "فشلت العملية: " + confirmError.message;
        } else {
            ev.complete('success');
            if (paymentIntent.status === "succeeded") {
                statusMsg.innerText = "تم الدفع بنجاح! شكراً لك.";
                // هنا يمكنك تحديث قاعدة بياناتك (Supabase) لتأكيد الطلب
            }
        }
    });
</script>
</body>
</html>
